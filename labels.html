<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kafé — Générateur d'étiquettes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:   #7a9e8f;
    --dark:   #1a1916;
    --muted:  #8a857c;
    --bg:     #f5f1ea;
    --border: #e2ddd5;
    --white:  #ffffff;
    --navy:   #1e2b3a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* ── EDITOR PANEL ── */
  .editor {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .page-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    letter-spacing: 0.08em;
    color: var(--dark);
  }

  .page-header p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
  }

  h2 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .recipe-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .recipe-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    position: relative;
  }

  .recipe-card .field-full {
    grid-column: 1 / -1;
  }

  .recipe-card label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .recipe-card input,
  .recipe-card textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--dark);
    background: #fdfcfa;
    outline: none;
    transition: border-color 0.15s;
    resize: none;
  }

  .recipe-card input:focus,
  .recipe-card textarea:focus {
    border-color: var(--sage);
  }

  .recipe-card textarea {
    height: 56px;
  }

  .btn-remove {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: none;
    cursor: pointer;
    color: #c5b9ac;
    font-size: 18px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }

  .btn-remove:hover { color: #c0392b; background: #fdf0ee; }

  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 18px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, background 0.15s;
  }

  .btn-primary {
    background: var(--dark);
    color: var(--white);
  }

  .btn-secondary {
    background: var(--white);
    color: var(--dark);
    border: 1px solid var(--border);
  }

  .btn-print {
    background: var(--sage);
    color: var(--white);
    margin-left: auto;
  }

  .btn:hover { opacity: 0.85; }

  /* ── PREVIEW SECTION ── */
  .preview-section {
    margin-top: 40px;
  }

  .preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .a4-preview {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10mm;
    aspect-ratio: 210 / 297;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: calc((297mm - 20mm) / 4);
    gap: 6mm;
    overflow: hidden;
    /* Scale to fit in editor */
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    /* The grid cells will scale proportionally */
  }

  /* ── LABEL ── */
  .label {
    background: #fff;
    border: 1px solid #d4cfc8;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .label-body {
    flex: 1;
    padding: 8% 9% 4%;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .label-title {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: clamp(10px, 2.5vw, 17px);
    color: var(--dark);
    line-height: 1.2;
    word-break: break-word;
  }

  .label-ingredients {
    font-size: clamp(7px, 1.5vw, 10px);
    color: #555;
    line-height: 1.4;
    font-weight: 300;
  }

  .label-footer {
    background: var(--navy);
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
  }

  .label-price {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(11px, 2.8vw, 20px);
    color: #fff;
    padding: 6% 8%;
    border-right: 1px solid rgba(255,255,255,0.12);
    white-space: nowrap;
    display: flex;
    align-items: center;
  }

  .label-allergens {
    font-size: clamp(5px, 1.2vw, 8px);
    color: rgba(255,255,255,0.7);
    padding: 4% 6%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1.5;
    word-break: break-word;
  }

  .label-allergens span {
    font-size: clamp(4px, 0.9vw, 7px);
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.08em;
  }

  .label-bottom-spacer {
    height: 8%;
    flex-shrink: 0;
    background: #fff;
  }

  .label-empty {
    opacity: 0.25;
    border-style: dashed;
    background: #faf9f7;
  }

  /* ── PRINT STYLES ── */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    body > * { display: none !important; }
    body > .print-sheet { display: block !important; }

    .print-sheet {
      width: 210mm;
      min-height: 297mm;
      padding: 10mm;
      background: #fff;
    }

    .print-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6mm;
      width: 100%;
    }

    .print-label {
      height: 63mm;
      background: #fff;
      border: 0.5pt solid #ccc;
      border-radius: 2mm;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .print-label-body {
      flex: 1;
      padding: 5mm 6mm 3mm;
      display: flex;
      flex-direction: column;
      gap: 3mm;
    }

    .print-label-title {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 16pt;
      color: #1a1916;
      line-height: 1.15;
    }

    .print-label-ingredients {
      font-family: 'DM Sans', sans-serif;
      font-size: 7.5pt;
      color: #555;
      line-height: 1.45;
      font-weight: 300;
    }

    .print-label-footer {
      background: #1e2b3a !important;
      display: flex;
      flex-shrink: 0;
    }

    .print-label-price {
      font-family: 'DM Serif Display', serif;
      font-size: 18pt;
      color: #fff !important;
      padding: 3mm 5mm;
      border-right: 0.3pt solid rgba(255,255,255,0.15);
      white-space: nowrap;
      display: flex;
      align-items: center;
    }

    .print-label-allergens {
      font-family: 'DM Sans', sans-serif;
      font-size: 6.5pt;
      color: rgba(255,255,255,0.75) !important;
      padding: 2.5mm 4mm;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1.5;
    }

    .print-label-allergens span {
      font-size: 5.5pt;
      color: rgba(255,255,255,0.45) !important;
      letter-spacing: 0.08em;
    }

    .print-label-spacer {
      height: 5mm;
      background: #fff;
      flex-shrink: 0;
    }
  }

  .print-sheet { display: none; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════ EDITOR ═══ -->
<div class="editor">
  <div class="page-header">
    <div class="logo-text">Kafé</div>
    <p>Générateur d'étiquettes recettes</p>
  </div>

  <h2>Recettes</h2>
  <div class="recipe-list" id="recipeList"></div>

  <div class="actions">
    <button class="btn btn-secondary" onclick="addRecipe()">+ Ajouter une recette</button>
    <button class="btn btn-print" onclick="printLabels()">Imprimer</button>
  </div>

  <div class="preview-section">
    <div class="preview-header">
      <h2 style="margin:0">Aperçu A4</h2>
      <span style="font-size:12px;color:var(--muted)">2 colonnes · jusqu'à 8 étiquettes</span>
    </div>
    <div class="a4-preview" id="a4Preview"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ PRINT SHEET ═══ -->
<div class="print-sheet" id="printSheet">
  <div class="print-grid" id="printGrid"></div>
</div>

<script>
  const SLOTS = 8; // 2 cols × 4 rows on A4

  let recipes = [
    { title: 'poulet bang bang', ingredients: 'poulet rôti, sauce bang bang (mayo, sriracha, miel), concombre, coriandre, sésame', price: '12,50€', allergens: 'gluten, œufs, sésame' },
    { title: 'rocher choco vegan', ingredients: 'banane, noix de coco, sucre, pépites de chocolat', price: '3,00€', allergens: 'néant' },
  ];

  function addRecipe() {
    recipes.push({ title: '', ingredients: '', price: '', allergens: '' });
    render();
  }

  function removeRecipe(i) {
    recipes.splice(i, 1);
    render();
  }

  function getVal(i, field) {
    const el = document.querySelector(`[data-i="${i}"][data-field="${field}"]`);
    return el ? el.value : recipes[i][field];
  }

  function syncFromDOM() {
    document.querySelectorAll('[data-i]').forEach(el => {
      const i = +el.dataset.i;
      const field = el.dataset.field;
      if (recipes[i] !== undefined) recipes[i][field] = el.value;
    });
  }

  function render() {
    renderEditor();
    renderPreview();
  }

  function renderEditor() {
    const list = document.getElementById('recipeList');
    list.innerHTML = recipes.map((r, i) => `
      <div class="recipe-card">
        <button class="btn-remove" onclick="removeRecipe(${i})" title="Supprimer">×</button>
        <div class="field-full">
          <label>Titre de la recette</label>
          <input type="text" data-i="${i}" data-field="title" value="${esc(r.title)}" placeholder="ex: poulet bang bang" oninput="syncLive(${i})">
        </div>
        <div class="field-full">
          <label>Ingrédients</label>
          <textarea data-i="${i}" data-field="ingredients" placeholder="ex: poulet rôti, sauce bang bang, ..." oninput="syncLive(${i})">${esc(r.ingredients)}</textarea>
        </div>
        <div>
          <label>Prix</label>
          <input type="text" data-i="${i}" data-field="price" value="${esc(r.price)}" placeholder="ex: 12,50€" oninput="syncLive(${i})">
        </div>
        <div>
          <label>Allergènes</label>
          <input type="text" data-i="${i}" data-field="allergens" value="${esc(r.allergens)}" placeholder="ex: gluten, œufs" oninput="syncLive(${i})">
        </div>
      </div>
    `).join('');
  }

  function syncLive(i) {
    const inputs = document.querySelectorAll(`[data-i="${i}"]`);
    inputs.forEach(el => { recipes[i][el.dataset.field] = el.value; });
    renderPreview();
  }

  function renderPreview() {
    const preview = document.getElementById('a4Preview');
    preview.innerHTML = '';
    for (let i = 0; i < SLOTS; i++) {
      const r = recipes[i];
      if (!r) {
        const empty = document.createElement('div');
        empty.className = 'label label-empty';
        preview.appendChild(empty);
        continue;
      }
      preview.appendChild(buildLabelNode(r));
    }
  }

  function buildLabelNode(r) {
    const label = document.createElement('div');
    label.className = 'label';

    const allergenText = r.allergens
      ? r.allergens.toUpperCase()
      : 'NÉANT';

    label.innerHTML = `
      <div class="label-body">
        <div class="label-title">${esc(r.title) || '<em style="opacity:.3">Titre…</em>'}</div>
        <div class="label-ingredients">${esc(r.ingredients) || ''}</div>
      </div>
      <div class="label-footer">
        <div class="label-price">${esc(r.price) || '—'}</div>
        <div class="label-allergens">
          <span>Allergènes</span>
          ${esc(allergenText)}
        </div>
      </div>
      <div class="label-bottom-spacer"></div>
    `;
    return label;
  }

  function printLabels() {
    syncFromDOM();
    const grid = document.getElementById('printGrid');
    grid.innerHTML = '';

    recipes.forEach(r => {
      const allergenText = r.allergens ? r.allergens.toUpperCase() : 'NÉANT';
      const div = document.createElement('div');
      div.className = 'print-label';
      div.innerHTML = `
        <div class="print-label-body">
          <div class="print-label-title">${esc(r.title)}</div>
          <div class="print-label-ingredients">${esc(r.ingredients)}</div>
        </div>
        <div class="print-label-footer">
          <div class="print-label-price">${esc(r.price)}</div>
          <div class="print-label-allergens">
            <span>Allergènes</span>
            ${esc(allergenText)}
          </div>
        </div>
        <div class="print-label-spacer"></div>
      `;
      grid.appendChild(div);
    });

    window.print();
  }

  function esc(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Initial render
  render();
</script>
</body>
</html>
