<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traiteur — Kafé Paris</title>
<meta name="description" content="Plateaux traiteur livrés au bureau. À partir de 15€/pers, lundi au vendredi, Paris 10e.">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage:  #92B0A3;
    --ink:   #191919;
    --cream: #f5f1ea;
    --red:   #e40234;
    --peach: #f9c892;
    --brown: #7a6040;
    --white: #ffffff;
  }

  html { scroll-behavior: smooth; }
  body { font-family: 'Satoshi', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

  /* ══════════════════════════════════════
     HERO — sticky, sage green
  ══════════════════════════════════════ */
  .hero {
    position: sticky;
    top: 0;
    z-index: 0;
    background: var(--sage);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 32px 48px 48px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
    display: block;
    filter: brightness(0.38) saturate(0.8);
  }

  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 10, 0.25);
  }

  .hero-nav,
  .hero-logo-wrap {
    position: relative;
    z-index: 1;
  }

  .hero-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0;
  }

  .hero-nav-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }

  .hero-logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 0;
  }

  .hero-logo {
    width: min(680px, 85vw);
    display: block;
    filter: invert(1) brightness(20);
    mix-blend-mode: screen;
  }

  .hero-bottom {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 40px;
    align-items: end;
  }

  .hero-headline {
    font-size: clamp(26px, 3.5vw, 44px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--ink);
    max-width: 560px;
  }

  .hero-headline em {
    font-style: normal;
    opacity: 0.45;
  }

  .hero-cta-block {
    text-align: right;
    flex-shrink: 0;
  }

  .hero-meta {
    font-size: 11px;
    font-weight: 400;
    color: var(--ink);
    opacity: 0.5;
    margin-bottom: 14px;
    line-height: 1.8;
    letter-spacing: 0.04em;
  }

  .btn-primary {
    display: inline-block;
    background: var(--ink);
    color: var(--sage);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 16px 32px;
    border-radius: 100px;
    text-decoration: none;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  .btn-primary:hover { opacity: 0.8; }

  /* ══════════════════════════════════════
     SCROLLING WRAPPER
  ══════════════════════════════════════ */
  .scroll-wrap { position: relative; z-index: 1; }

  /* ══════════════════════════════════════
     SECTION ARGUMENTS — dark
  ══════════════════════════════════════ */
  .s-args {
    background: var(--ink);
    color: var(--cream);
    padding: 80px 48px;
  }

  .args-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 48px;
  }

  .args-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 48px;
    border-top: 1px solid rgba(245,241,234,0.1);
    padding-top: 48px;
  }

  .arg-num {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--sage);
    opacity: 0.3;
    line-height: 1;
    margin-bottom: 16px;
  }

  .arg-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
    line-height: 1.2;
  }

  .arg-desc {
    font-size: 13px;
    font-weight: 300;
    color: rgba(245,241,234,0.55);
    line-height: 1.7;
  }

  /* ══════════════════════════════════════
     SECTION FORMULES — cream
  ══════════════════════════════════════ */
  .s-formules {
    background: var(--cream);
    padding: 80px 48px;
  }

  .formules-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(25,25,25,0.1);
  }

  .section-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.4;
  }

  .formules-note {
    font-size: 12px;
    font-weight: 300;
    color: var(--ink);
    opacity: 0.4;
  }

  .formules-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 2px 24px rgba(25,25,25,0.06);
    transition: transform 0.25s, box-shadow 0.25s;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(25,25,25,0.12);
  }

  .card-top {
    padding: 28px 28px 24px;
    border-bottom: 1px solid rgba(25,25,25,0.06);
  }

  .card-accent {
    width: 28px;
    height: 3px;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .c1 .card-accent { background: var(--sage); }
  .c2 .card-accent { background: var(--peach); }
  .c3 .card-accent { background: var(--brown); }

  .card-eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.4;
    margin-bottom: 6px;
  }

  .card-price {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .c1 .card-price { color: var(--sage); filter: brightness(0.75); }
  .c2 .card-price { color: #c47a1a; }
  .c3 .card-price { color: var(--brown); }

  .card-timing {
    font-size: 12px;
    font-weight: 300;
    color: var(--ink);
    opacity: 0.45;
  }

  .card-min {
    display: inline-block;
    margin-top: 10px;
    font-size: 10px;
    font-weight: 500;
    border: 1px solid rgba(25,25,25,0.15);
    border-radius: 100px;
    padding: 3px 12px;
    color: var(--ink);
    opacity: 0.5;
    letter-spacing: 0.05em;
  }

  .card-body {
    padding: 24px 28px 28px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card-divider {
    height: 1px;
    background: rgba(25,25,25,0.07);
  }

  .group-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.5;
    margin-bottom: 6px;
  }

  .group-items {
    list-style: none;
  }

  .group-items li {
    font-size: 13px;
    font-weight: 400;
    color: var(--ink);
    opacity: 0.7;
    padding: 2px 0 2px 14px;
    position: relative;
    line-height: 1.5;
  }

  .group-items li::before {
    content: '·';
    position: absolute;
    left: 0;
    opacity: 0.5;
  }

  .group-items li.or {
    font-style: italic;
    padding-left: 0;
    font-size: 11px;
    opacity: 0.35;
  }

  .group-items li.or::before { content: ''; }

  .badge {
    display: inline-block;
    background: var(--brown);
    color: white;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 8px;
    opacity: 0.85;
  }

  .formules-cta {
    text-align: center;
    padding-top: 8px;
  }

  .formules-cta p {
    font-size: 13px;
    font-weight: 300;
    color: var(--ink);
    opacity: 0.45;
    margin-bottom: 20px;
  }

  .btn-dark {
    display: inline-block;
    background: var(--ink);
    color: var(--cream);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 16px 40px;
    border-radius: 100px;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .btn-dark:hover { opacity: 0.75; }

  /* ══════════════════════════════════════
     SECTION CONTACT — peach
  ══════════════════════════════════════ */
  .s-contact {
    background: var(--peach);
    padding: 80px 48px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: center;
  }

  .contact-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.45;
    margin-bottom: 20px;
  }

  .contact-headline {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 32px;
  }

  .contact-items { display: flex; flex-direction: column; gap: 12px; }

  .contact-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 13px;
    font-weight: 400;
    color: var(--ink);
    opacity: 0.6;
  }

  .contact-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ink);
    opacity: 0.3;
    flex-shrink: 0;
    margin-top: 8px;
  }

  .contact-right { text-align: right; }

  .contact-number {
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 900;
    letter-spacing: -0.03em;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 8px;
    text-decoration: none;
    display: block;
  }

  .contact-sub {
    font-size: 12px;
    font-weight: 300;
    color: var(--ink);
    opacity: 0.5;
    margin-bottom: 28px;
  }

  .btn-wa {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--ink);
    color: var(--peach);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 16px 32px;
    border-radius: 100px;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .btn-wa:hover { opacity: 0.8; }

  /* ══════════════════════════════════════
     FOOTER — sage
  ══════════════════════════════════════ */
  footer {
    background: var(--sage);
    padding: 32px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .footer-logo {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .footer-note {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.45;
  }

  .footer-link {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    opacity: 0.45;
    transition: opacity 0.2s;
  }

  .footer-link:hover { opacity: 1; }

  /* ══════════════════════════════════════
     RESPONSIVE
  ══════════════════════════════════════ */
  @media (max-width: 860px) {
    .hero { padding: 24px; }
    .s-args, .s-formules, .s-contact { padding: 56px 24px; }
    .args-grid { grid-template-columns: 1fr; gap: 32px; }
    .formules-grid { grid-template-columns: 1fr; }
    .s-contact { grid-template-columns: 1fr; gap: 40px; }
    .contact-right { text-align: left; }
    footer { padding: 28px 24px; flex-direction: column; gap: 16px; text-align: center; }
  }
</style>
</head>
<body>

<!-- ══ HERO ══ -->
<section class="hero">
  <div class="hero-bg">
    <img src="assets/kafe-ambiance.jpg" alt="Kafé ambiance">
  </div>
  <div class="hero-nav">
    <span class="hero-nav-label">Paris 10e · Lun–Ven</span>
    <span class="hero-nav-label">Traiteur</span>
  </div>
  <div class="hero-logo-wrap">
    <img class="hero-logo" src="assets/kafe-logo-white.png" alt="Kafé">
  </div>
  <div id="hero-bottom" class="hero-bottom" style="position:relative;z-index:1;"></div>
</section>

<!-- ══ SCROLL WRAP ══ -->
<div class="scroll-wrap">

  <!-- ARGUMENTS -->
  <section class="s-args">
    <div class="args-label">Pourquoi Kafé</div>
    <div id="args-grid" class="args-grid"></div>
  </section>

  <!-- FORMULES -->
  <section class="s-formules">
    <div class="formules-header">
      <span class="section-title">Nos formules</span>
      <span class="formules-note">Par personne · Lundi au vendredi</span>
    </div>
    <div id="formules-grid" class="formules-grid"></div>
    <div class="formules-cta">
      <p>Vous hésitez sur la formule ? On vous conseille.</p>
      <a href="https://wa.me/33664976390?text=Bonjour%2C%20je%20souhaite%20des%20infos%20sur%20les%20plateaux%20traiteur" class="btn-dark">
        Demander un devis →
      </a>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="s-contact">
    <div id="contact-left"></div>
    <div id="contact-right" class="contact-right"></div>
  </section>

</div><!-- /scroll-wrap -->

<!-- FOOTER -->
<footer>
  <span class="footer-logo">Kafé</span>
  <span class="footer-note">12 rue Martel · Paris 10e · Tarifs HT par personne</span>
  <a href="https://kafe.paris" class="footer-link">kafe.paris ↗</a>
</footer>

<script>
const STORAGE_KEY = 'kafe_catering_data';

const defaultData = {
  hero: {
    headline: "Régalez votre équipe.",
    subline: "On s'occupe du reste.",
  },
  args: [
    { title: "Fait maison chaque matin", desc: "Sandwichs, salades, cookies et gâteaux préparés sur place. Pain boulanger au levain bio petit épeautre, produits soigneusement sélectionnés. À déguster sur place au Kafé ou livré chez vous." },
    { title: "Livraison ou récupération", desc: "On livre dans le quartier ou vous venez chercher avec vos contenants. Gratuit à 250 m, 15€ jusqu'à 1 km." },
    { title: "Zéro prise de tête", desc: "Un message WhatsApp ou un email suffit. On confirme, on prépare, on livre." }
  ],
  formules: [
    {
      label: "Formule Essentielle",
      price: "15€",
      timing: "Par personne · déjeuner",
      min: "",
      sections: [
        { title: "Assortiment de sandwichs", items: ["Jambon Prince de Paris", "Rillette de truite fumée", "English (végétarien)"] },
        { title: "Cookies", items: ["Sésame chocolat fleur de sel", "Matcha chocolat blanc", "Pistache"] },
        { title: "Boisson au choix", items: ["Eau plate ou pétillante", "Botanical soda", "Charitea"] }
      ]
    },
    {
      label: "Formule Complète",
      price: "19€",
      timing: "Par personne · déjeuner",
      min: "Min. 12 personnes",
      sections: [
        { title: "Tous nos sandwichs", items: ["Rillette de truite fumée", "Jambon Prince de Paris", "Pastrami & relish de cornichons", "Bang Bang · English"] },
        { title: "Salade parisienne + Soupe du moment", items: [] },
        { title: "Dessert au choix", items: ["Fondant chocolat & fleur de sel", "Cookies (4 variétés)", "Madeleines citron"] },
        { title: "Boisson", items: ["1 boisson barista sur place ou froide"] }
      ]
    },
    {
      label: "Journée entière",
      price: "28€",
      timing: "Par personne · midi + goûter",
      min: "Min. 12 personnes",
      badge: "Le plus complet",
      sections: [
        { title: "Tous nos sandwichs", items: ["Rillette truite fumée · Jambon Paris", "Pastrami & relish · Bang Bang · English"] },
        { title: "Salade parisienne grand format + Soupe", items: [] },
        { title: "Thermos café Fèves", items: ["Colombie — notes fruitées, pomme verte, noisette"] },
        { title: "Pause goûter", items: ["Gâteau à l'orange · Banana Bread", "Madeleine citron · Barres de granola"] },
        { title: "1 boisson barista dans la journée", items: [] },
        { title: "Option composition florale 🌿", items: ["En collaboration avec notre fleuriste"] }
      ]
    }
  ],
  contact: {
    headline: "On vient\nchez vous",
    phone: "06 64 97 63 90",
    email: "hello@kafe.paris",
    sub: "WhatsApp ou appel · Lun–Ven",
    items: [
      "Gratuit à moins de 250 m du café",
      "15 € de livraison jusqu'à 1 km",
      "Récupération sur place avec consigne possible",
      "Commande la veille ou le matin avant 9h"
    ]
  }
};

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : defaultData;
  } catch { return defaultData; }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderHero(data) {
  const phoneEncoded = encodeURIComponent('Bonjour, je souhaite commander des plateaux traiteur');
  document.getElementById('hero-bottom').innerHTML = `
    <h1 style="font-size:clamp(28px,4vw,52px);font-weight:700;letter-spacing:-0.02em;line-height:1.05;color:#fff;">
      ${escHtml(data.hero.headline)}<br>
      <span style="opacity:0.4;">${escHtml(data.hero.subline)}</span>
    </h1>
    <div style="text-align:right;flex-shrink:0;">
      <div style="font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:14px;line-height:1.8;letter-spacing:0.04em;">À partir de 15€ / personne<br>Livraison ou sur place</div>
      <a href="https://wa.me/33664976390?text=${phoneEncoded}" style="display:inline-block;background:#fff;color:#191919;font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:16px 32px;border-radius:100px;text-decoration:none;">Commander sur WhatsApp →</a>
    </div>
  `;
}

function renderArgs(data) {
  document.getElementById('args-grid').innerHTML = data.args.map((a, i) => `
    <div>
      <div class="arg-num">0${i + 1}</div>
      <div class="arg-title">${escHtml(a.title)}</div>
      <div class="arg-desc">${escHtml(a.desc)}</div>
    </div>
  `).join('');
}

function renderFormules(data) {
  const classes = ['c1', 'c2', 'c3'];
  document.getElementById('formules-grid').innerHTML = data.formules.map((f, i) => {
    const cls = classes[i] || `c${i + 1}`;
    const badgeHtml = f.badge ? `<span class="badge">${escHtml(f.badge)}</span>` : '';
    const minHtml = f.min ? `<div class="card-min">${escHtml(f.min)}</div>` : '';
    const sectionsHtml = f.sections.map((s, si) => {
      const divider = si > 0 ? '<div class="card-divider"></div>' : '';
      const itemsHtml = s.items && s.items.length
        ? `<ul class="group-items">${s.items.map(item => `<li>${escHtml(item)}</li>`).join('')}</ul>`
        : '';
      return `${divider}<div><div class="group-title">${escHtml(s.title)}</div>${itemsHtml}</div>`;
    }).join('');
    return `
      <div class="card ${cls}">
        <div class="card-top">
          ${badgeHtml}
          <div class="card-accent"></div>
          <div class="card-eyebrow">${escHtml(f.label)}</div>
          <div class="card-price">${escHtml(f.price)}</div>
          <div class="card-timing">${escHtml(f.timing)}</div>
          ${minHtml}
        </div>
        <div class="card-body">${sectionsHtml}</div>
      </div>
    `;
  }).join('');
}

function renderContact(data) {
  const c = data.contact;
  const phoneRaw = c.phone.replace(/\s/g, '');
  const phoneLink = phoneRaw.startsWith('0') ? '+33' + phoneRaw.slice(1) : phoneRaw;
  const headlineHtml = escHtml(c.headline).replace(/\n/g, '<br>');
  const itemsHtml = c.items.map(item => `
    <div class="contact-item">
      <div class="contact-dot"></div>
      <span>${escHtml(item)}</span>
    </div>
  `).join('');

  document.getElementById('contact-left').innerHTML = `
    <div class="contact-label">Commander</div>
    <div class="contact-headline">${headlineHtml}</div>
    <div class="contact-items">${itemsHtml}</div>
  `;

  const waMsg = encodeURIComponent('Bonjour, je souhaite commander des plateaux traiteur');
  document.getElementById('contact-right').innerHTML = `
    <a href="tel:${phoneLink}" class="contact-number">${escHtml(c.phone)}</a>
    <div class="contact-sub">${escHtml(c.sub)}</div>
