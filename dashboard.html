<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kafé — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e0dbd2;
    --text: #1a1916;
    --muted: #8a857c;
    --silver: #6e6b66;
    --gold: #9a7a2a;
    --black-tier: #1a1916;
    --accent: #9a7a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  /* LOGIN */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .login-box {
    width: 100%;
    max-width: 360px;
  }

  .login-box .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    margin-bottom: 48px;
    letter-spacing: -0.5px;
  }

  .login-box label {
    display: block;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .login-box input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 14px;
    border-radius: 6px;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .login-box input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #ffffff;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 13px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
    margin-top: 8px;
  }

  .btn-primary:hover { opacity: 0.85; }

  .login-error {
    color: #e06c6c;
    font-size: 12px;
    margin-top: 12px;
    display: none;
  }

  /* APP */
  #app { display: none; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-logo {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    letter-spacing: -0.3px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    color: var(--muted);
    font-size: 12px;
  }

  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .btn-logout:hover { color: var(--text); border-color: var(--text); }

  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 32px;
  }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .stat-label {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: 'Instrument Serif', serif;
    font-size: 36px;
    line-height: 1;
  }

  .stat-value.silver { color: var(--silver); }
  .stat-value.gold { color: var(--gold); }
  .stat-value.black-tier { color: var(--black-tier); }

  /* GENERATE */
  .section-title {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .generate-row {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .tier-btn {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .tier-btn:hover { border-color: var(--accent); }

  .tier-btn .tier-name {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
    margin-bottom: 4px;
  }

  .tier-btn .tier-discount {
    color: var(--muted);
    font-size: 12px;
  }

  .tier-btn .tier-accent {
    position: absolute;
    top: 0; right: 0;
    width: 3px;
    height: 100%;
  }

  .tier-btn[data-tier="silver"] .tier-accent { background: var(--silver); }
  .tier-btn[data-tier="gold"] .tier-accent { background: var(--gold); }
  .tier-btn[data-tier="black"] .tier-accent { background: var(--black-tier); }

  .tier-btn[data-tier="silver"] .tier-name { color: var(--silver); }
  .tier-btn[data-tier="gold"] .tier-name { color: var(--gold); }
  .tier-btn[data-tier="black"] .tier-name { color: var(--black-tier); }

  /* QR MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    max-width: 420px;
    width: 90%;
    text-align: center;
  }

  .modal-tier {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    margin-bottom: 4px;
  }

  .modal-code {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 24px;
    letter-spacing: 0.1em;
  }

  #qr-container {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  #qr-container canvas, #qr-container img {
    border-radius: 8px;
  }

  .modal-url {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--muted);
    word-break: break-all;
    margin-bottom: 20px;
    text-align: left;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
  }

  .btn-secondary {
    flex: 1;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-secondary:hover { background: var(--surface2); }

  .modal .btn-primary { flex: 1; margin-top: 0; width: auto; }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }

  /* NOTES INPUT */
  .notes-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    align-items: center;
  }

  .notes-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 9px 12px;
    border-radius: 6px;
    outline: none;
  }

  .notes-row input:focus { border-color: var(--accent); }
  .notes-row input::placeholder { color: var(--muted); }

  /* CARDS LIST */
  .cards-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .table-header {
    display: grid;
    grid-template-columns: 180px 80px 80px 1fr 120px 80px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .table-row {
    display: grid;
    grid-template-columns: 180px 80px 80px 1fr 120px 80px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.15s;
  }

  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--surface2); }

  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .badge-pending { background: rgba(107,105,96,0.2); color: var(--muted); }
  .badge-active { background: rgba(201,168,76,0.15); color: var(--gold); }
  .badge-disabled { background: rgba(224,108,108,0.15); color: #e06c6c; }

  .tier-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 8px;
  }

  .tier-dot.silver { background: var(--silver); }
  .tier-dot.gold { background: var(--gold); }
  .tier-dot.black { background: var(--black-tier); }

  .btn-sm {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .btn-sm:hover { color: var(--text); border-color: var(--text); }

  .empty-state {
    padding: 40px;
    text-align: center;
    color: var(--muted);
  }

  /* FILTERS */
  .filters-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--text);
  }

  .loading {
    padding: 32px;
    text-align: center;
    color: var(--muted);
  }

  @media (max-width: 768px) {
    header { padding: 14px 16px; }
    .main { padding: 24px 16px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .table-header, .table-row { grid-template-columns: 1fr 70px 80px 70px; }
    .table-header > *:nth-child(4),
    .table-row > *:nth-child(4),
    .table-header > *:nth-child(6),
    .table-row > *:nth-child(6) { display: none; }
  }
</style>
</head>

  <div class="main">

      </div>
      <div class="stat-card">
        <div class="stat-label">Silver actives</div>
        <div class="stat-value silver" id="stat-silver">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Gold actives</div>
        <div class="stat-value gold" id="stat-gold">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Black actives</div>
        <div class="stat-value black-tier" id="stat-black">—</div>
      </div>
    </div>

    <!-- Generate -->
    <div class="section-title">Générer une carte</div>
    <div class="notes-row">
      <input type="text" id="card-notes" placeholder="Note interne (ex: Hexa - Marie Laurent)">
    </div>
    <div class="generate-row">
      <button class="tier-btn" data-tier="silver" onclick="generateCard('silver', 5)">

        <div class="tier-discount">−5% à chaque passage</div>
      </button>
      <button class="tier-btn" data-tier="gold" onclick="generateCard('gold', 10)">
        <div class="tier-accent"></div>
        <div class="tier-name">Gold</div>
        <div class="tier-discount">−10% à chaque passage</div>
      </button>
      <button class="tier-btn" data-tier="black" onclick="generateCard('black', 20)">
        <div class="tier-accent"></div>
        <div class="tier-name">Black</div>
        <div class="tier-discount">−20% à chaque passage</div>
      </button>

      <button class="filter-btn" onclick="filterCards('pending', this)">En attente</button>
      <button class="filter-btn" onclick="filterCards('active', this)">Actives</button>
      <button class="filter-btn" onclick="filterCards('silver', this)">Silver</button>
      <button class="filter-btn" onclick="filterCards('gold', this)">Gold</button>

<!-- QR Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="position:relative;">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-tier" id="modal-tier">Gold</div>
    <div class="modal-code" id="modal-code">KAFE-GOLD-001</div>
    <div id="qr-container"></div>
    <div class="modal-url" id="modal-url"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="copyUrl()">Copier le lien</button>
      <button class="btn-primary" onclick="downloadQR()">Télécharger QR</button>
    </div>
  </div>
</div>

<script>
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allCards = [];
  let currentFilter = 'all';
  let currentQRCode = null;
  let currentCode = '';

  // ---- AUTH ----
  function login() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    if (email === MERCHANT_EMAIL && pass === MERCHANT_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('header-date').textContent = new Date().toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
      loadCards();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  function logout() {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  // ---- GENERATE ----
  async function generateCard(tier, discount) {
    const notes = document.getElementById('card-notes').value.trim();
    const count = allCards.filter(c => c.tier === tier).length + 1;
    const code = `KAFE-${tier.toUpperCase()}-${String(count).padStart(3,'0')}-${Date.now().toString(36).toUpperCase()}`;

    const { data, error } = await sb.from('loyalty_cards').insert({
      code, tier, discount, notes: notes || null
    }).select().single();

    if (error) { alert('Erreur: ' + error.message); return; }

    document.getElementById('card-notes').value = '';
    await loadCards();
    showQR(code, tier, discount);
  }

  // ---- QR MODAL ----
  function showQR(code, tier, discount) {
    currentCode = code;
    const url = `${APP_BASE_URL}/activate.html?code=${code}`;
    document.getElementById('modal-tier').textContent = `${tier.charAt(0).toUpperCase() + tier.slice(1)} — −${discount}%`;
    document.getElementById('modal-code').textContent = code;
    document.getElementById('modal-url').textContent = url;

    const container = document.getElementById('qr-container');
    container.innerHTML = '';
    currentQRCode = new QRCode(container, {
      text: url,
      width: 180,
      height: 180,
      colorDark: '#1a1916',
      colorLight: '#ffffff',
    });

    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function copyUrl() {
    const url = document.getElementById('modal-url').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = event.target;
      btn.textContent = 'Copié !';
      setTimeout(() => btn.textContent = 'Copier le lien', 1500);
    });
  }

  function downloadQR() {
    const canvas = document.querySelector('#qr-container canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = `kafe-${currentCode}.png`;
    link.href = canvas.toDataURL();
    link.click();
  }

  // ---- LOAD CARDS ----
  async function loadCards() {
    const { data, error } = await sb
      .from('loyalty_cards')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) { console.error(error); return; }
    allCards = data || [];
    updateStats();
    renderCards();
  }

  function updateStats() {
    document.getElementById('stat-total').textContent = allCards.length;
    document.getElementById('stat-silver').textContent = allCards.filter(c => c.tier === 'silver' && c.status === 'active').length;
    document.getElementById('stat-gold').textContent = allCards.filter(c => c.tier === 'gold' && c.status === 'active').length;
    document.getElementById('stat-black').textContent = allCards.filter(c => c.tier === 'black' && c.status === 'active').length;
  }

  function filterCards(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
  }

  function renderCards() {
    let cards = allCards;
    if (currentFilter === 'pending') cards = cards.filter(c => c.status === 'pending');
    else if (currentFilter === 'active') cards = cards.filter(c => c.status === 'active');
    else if (['silver','gold','black'].includes(currentFilter)) cards = cards.filter(c => c.tier === currentFilter);

    const list = document.getElementById('cards-list');

    if (!cards.length) {
      list.innerHTML = '<div class="empty-state">Aucune carte</div>';
      return;
    }

    list.innerHTML = cards.map(card => `
      <div class="table-row">
        <span style="font-size:11px;letter-spacing:0.05em;">${card.code}</span>
        <span>
          <span class="tier-dot ${card.tier}"></span>
          <span style="color:var(--${card.tier === 'black' ? 'black-tier' : card.tier})">${card.tier}</span>
        </span>
        <span><span class="badge badge-${card.status}">${card.status}</span></span>
        <span style="color:${card.client_firstname ? 'var(--text)' : 'var(--muted)'};">
          ${card.client_firstname ? `${card.client_firstname} ${card.client_lastname}` : (card.notes || '—')}
        </span>
        <span style="color:var(--muted);font-size:11px;">
          ${card.activated_at ? new Date(card.activated_at).toLocaleDateString('fr-FR') : '—'}
        </span>
        <span>
          <button class="btn-sm" onclick="showQR('${card.code}', '${card.tier}', ${card.discount})">QR</button>
        </span>
      </div>
    `).join('');
  }

  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
