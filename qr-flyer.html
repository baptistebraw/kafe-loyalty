<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Flyer — Kafé</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700;9..40,900&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f1ea;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 40px;
  }

  .qr-block {
    background: #ffffff;
    border-radius: 24px;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.07);
  }

  #qr-canvas canvas { display: none !important; }
  #qr-canvas img {
    display: block;
    width: 300px !important;
    height: 300px !important;
    border-radius: 4px;
  }

  .qr-label {
    text-align: center;
  }

  .qr-logo {
    height: 28px;
    width: auto;
    display: block;
    margin: 0 auto 12px;
  }

  .qr-cta {
    font-weight: 900;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: #1a1916;
    margin-bottom: 4px;
  }

  .qr-sub {
    font-size: 14px;
    color: #8a857c;
  }

  .qr-url {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #8a857c;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }

  .btn-dl {
    background: #1a1916;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 28px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-dl:hover { opacity: 0.8; }

  .note {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #8a857c;
    text-align: center;
    line-height: 1.6;
    max-width: 360px;
  }
</style>
</head>
<body>

<div class="qr-block">
  <div id="qr-canvas"></div>
  <div class="qr-label">
    <img class="qr-logo" src="assets/kafe-wordmark.png" alt="Kafé">
    <p class="qr-cta">Rejoins le programme fidélité</p>
    <p class="qr-sub">−5% à chaque visite · 1 café offert à l'ouverture</p>
    <p class="qr-url">loyalty.kafe.paris/join</p>
  </div>
</div>

<button class="btn-dl" onclick="downloadQR()">⬇ Télécharger le QR (PNG)</button>

<p class="note">
  Résolution : 300×300 px — suffisant pour impression jusqu'à 5×5 cm.<br>
  Pour un flyer plus grand, contacter hello@kafe.paris.
</p>

<script>
  const TARGET = 'https://loyalty.kafe.paris/join.html';

  new QRCode(document.getElementById('qr-canvas'), {
    text: TARGET,
    width: 600,
    height: 600,
    colorDark: '#1a1916',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  function downloadQR() {
    setTimeout(() => {
      const img = document.querySelector('#qr-canvas img');
      if (!img) return alert('QR pas encore prêt');
      const a = document.createElement('a');
      a.download = 'kafe-qr-flyer.png';
      a.href = img.src;
      a.click();
    }, 200);
  }
</script>
</body>
</html>
